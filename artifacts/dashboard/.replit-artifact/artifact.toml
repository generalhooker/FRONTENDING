kind = "web"
  previewPath = "/"
  title = "Dashboard"
  version = "1.0.0"
  id = "artifacts/dashboard"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 3000

  [services.development]
  run = "pnpm --filter @workspace/dashboard run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/dashboard", "run", "build" ]
  publicDir = "artifacts/dashboard/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "3000"
  BASE_PATH = "/"
  